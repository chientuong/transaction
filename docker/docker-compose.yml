services:
  laravel-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: laravel_app
    ports:
      # Map port 9999 của máy tính (host) vào port 8000 của container
      - "9999:8000"
    volumes:
      - ..:/app
    depends_on:
      - mysql
      - redis
    environment:
      # Ghi đè các cấu hình kết nối DB & Redis để kết nối sang các container phụ
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: transaction
      DB_USERNAME: chientv
      DB_PASSWORD: chientv
      REDIS_HOST: redis
      REDIS_PASSWORD: null
      REDIS_PORT: 6379
    # Khi start container, cài đặt thư viện và chạy ứng dụng
    command: >
      bash -c "composer install
      && npm install
      && npm run build
      && /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf"

  mysql:
    image: 'mysql/mysql-server:8.0'
    container_name: laravel_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: transaction
      MYSQL_USER: chientv
      MYSQL_PASSWORD: chientv
      MYSQL_ALLOW_EMPTY_PASSWORD: '1'
    volumes:
      - laravel-mysql:/var/lib/mysql

  redis:
    image: 'redis:alpine'
    container_name: laravel_redis
    ports:
      - "6379:6379"
    volumes:
      - laravel-redis:/data

volumes:
  laravel-mysql:
    driver: local
  laravel-redis:
    driver: local
