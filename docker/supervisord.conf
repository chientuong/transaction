[supervisord]
user=root
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:laravel-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /app/artisan queue:work --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=root
numprocs=5
redirect_stderr=true
stdout_logfile=/app/storage/logs/worker.log
stopwaitsecs=3600

[program:php-serve]
command=php /app/artisan serve --host=0.0.0.0 --port=8000
autostart=true
autorestart=true
user=root
stdout_logfile=/app/storage/logs/serve.log
stderr_logfile=/app/storage/logs/serve_error.log
